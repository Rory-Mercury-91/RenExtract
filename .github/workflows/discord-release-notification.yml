name: Discord Release Notification

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag de la release (ex: v1.2.10)'
        required: true
        default: 'v1.2.10'

jobs:
  notify-discord:
    name: Notify Discord
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - name: Extract Version
        id: version
        run: |
          # Utiliser le tag de l'événement release ou l'input manuel
          if [ "${{ github.event_name }}" == "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ github.event.inputs.tag_name }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_number=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Extract Changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Extraire la section du CHANGELOG pour cette version
          # Recherche flexible : accepte "## YYYY-MM-DD (vX.Y.Z)" ou "## YYYY-MM-DD (X.Y.Z)"
          awk -v ver="$VERSION" '
            BEGIN { 
              # Nettoyer la version (enlever le v si présent)
              gsub(/^v/, "", ver)
            }
            /^## [0-9]{4}-[0-9]{2}-[0-9]{2} \(/ {
              # Extraire la version entre parenthèses
              match($0, /\(v?([0-9]+\.[0-9]+\.[0-9]+)\)/, arr)
              if (arr[1] == ver) {
                started = 1
                next
              } else if (started) {
                exit
              }
            }
            started { print }
          ' CHANGELOG.md > changelog_extract.txt
          
          # Vérifier si le changelog a été extrait
          if [ ! -s changelog_extract.txt ]; then
            echo "ATTENTION: Changelog vide pour $VERSION" >&2
            echo "Contenu disponible dans les prochaines releases." > changelog_extract.txt
          fi
          
          # Limiter à 1000 caractères pour Discord field (limite: 1024)
          head -c 1000 changelog_extract.txt > changelog_short.txt

      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ steps.version.outputs.version }}
          VERSION_NUMBER: ${{ steps.version.outputs.version_number }}
        run: |
          # Lire le changelog et le résumé depuis les fichiers
          CHANGELOG_RAW=$(cat changelog_short.txt)
          SUMMARY_RAW=$(awk '/^### / { if (count++ < 3) print "• " $0 }' changelog_extract.txt | sed 's/### //')
          
          # Construire le JSON avec jq pour échappement correct
          jq -n \
            --arg username "RenExtract Release Bot" \
            --arg avatar "https://github.com/Rory-Mercury-91.png" \
            --arg version "$VERSION" \
            --arg version_num "$VERSION_NUMBER" \
            --arg summary "$SUMMARY_RAW" \
            --arg changelog "$CHANGELOG_RAW" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" \
            '{
              "username": $username,
              "avatar_url": $avatar,
              "embeds": [{
                "title": ("🚀 RenExtract " + $version + " - Nouvelle Version Disponible !"),
                "description": "**Une mise à jour importante de RenExtract est maintenant disponible.**\n\n",
                "color": 5814783,
                "fields": [
                  {
                    "name": "✨ Points Clés de cette Version",
                    "value": $summary,
                    "inline": false
                  },
                  {
                    "name": "📝 Changements Complets",
                    "value": $changelog,
                    "inline": false
                  },
                  {
                    "name": "⬇️ Téléchargements",
                    "value": ("**Windows** : [💾 Télécharger](https://github.com/Rory-Mercury-91/RenExtract/releases/download/" + $version + "/RenExtract-" + $version + "-Windows.zip)\n**Linux** : [💾 Télécharger](https://github.com/Rory-Mercury-91/RenExtract/releases/download/" + $version + "/RenExtract-" + $version + "-Linux.tar.gz)"),
                    "inline": false
                  },
                  {
                    "name": "🔗 Liens Utiles",
                    "value": ("📦 [Page de la Release](https://github.com/Rory-Mercury-91/RenExtract/releases/tag/" + $version + ")\n📝 [CHANGELOG Complet](https://github.com/Rory-Mercury-91/RenExtract/blob/main/CHANGELOG.md)\n🐛 [Signaler un Bug](https://github.com/Rory-Mercury-91/RenExtract/issues)"),
                    "inline": false
                  }
                ],
                "footer": {
                  "text": ("RenExtract v" + $version_num + " • Production Ready • Merci de votre soutien !"),
                  "icon_url": $avatar
                },
                "timestamp": $timestamp
              }]
            }' > discord_payload.json
          
          # Envoyer le JSON à Discord
          curl -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d @discord_payload.json

